<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatório de Posts — Abr/Mai 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --faz:#D85A30;--faz-l:#FAECE7;
  --pla:#1D9E75;--pla-l:#E1F5EE;
  --vit:#378ADD;--vit-l:#E6F1FB;
  --sol:#639922;--sol-l:#EAF3DE;
  --edu:#BA7517;--edu-l:#FAEEDA;
  --bg:#f6f4ef;--card:#fff;--text:#1a1a1a;--muted:#6e6b66;--border:#e4e0d8
}
body{font-family:'Roboto',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* HEADER */
.top-bar{background:#005caa;padding:1.5rem 2.5rem;display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap}
.top-bar h1{font-family:'Roboto',sans-serif;font-size:1.4rem;font-weight:800;color:#fff;letter-spacing:-0.02em}
.top-bar p{color:#fff;font-size:12px;margin-top:3px}
.m-btns{display:flex;gap:6px}
.m-btn{background:transparent;color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.3);padding:5px 14px;border-radius:100px;font-family:'Roboto',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:.2s}
.m-btn:hover{background:rgba(255,255,255,.15);color:#fff}
.m-btn.active{background:#fff;color:#005caa;border-color:#fff}

/* COMPANY TABS */
.co-nav{background:#004a8c;padding:.8rem 2.5rem;display:flex;gap:4px;overflow-x:auto;scrollbar-width:none}
.co-nav::-webkit-scrollbar{display:none}
.co-tab{background:transparent;border:1px solid rgba(255,255,255,.25);color:rgba(255,255,255,.6);padding:6px 16px;border-radius:8px;font-family:'Roboto',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:.2s;white-space:nowrap;flex-shrink:0}
.co-tab:hover{background:rgba(255,255,255,.1);color:#fff}
.co-tab.active{color:#fff;border-color:var(--ac)}
.co-tab[data-co="geral"].active{background:#fff;color:#005caa;border-color:#fff}

/* OVERVIEW */
.ov-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;padding:1.5rem 2.5rem;background:#004a8c}
.ov-card{background:#003d75;border-radius:10px;padding:1rem 1.1rem;cursor:pointer;transition:.2s;border:2px solid transparent}
.ov-card:hover{background:#004a8c}
.ov-card.active{border-color:var(--ac)}
.ov-name{font-family:'Roboto',sans-serif;font-size:11px;font-weight:700;color:rgba(255,255,255,.55);letter-spacing:.06em;text-transform:uppercase;margin-bottom:.7rem}
.ov-row{display:flex;gap:10px}
.ov-m{flex:1}
.ov-ml{font-size:9px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.ov-v{font-family:'Roboto',sans-serif;font-size:1.6rem;font-weight:800;color:#fff;line-height:1}
.ov-bar{height:3px;border-radius:3px;margin-top:6px;background:var(--ac);opacity:.5}
.ov-bar.active-m{opacity:1}

/* MAIN CONTENT */
.content{padding:2rem 2.5rem}

/* GERAL VIEW */
.geral-chart-card{background:var(--card);border-radius:12px;padding:1.5rem;border:1px solid var(--border);margin-bottom:1.5rem}
.geral-chart-card h2{font-family:'Roboto',sans-serif;font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:1rem}
.tipos-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.tipo-mini{background:var(--card);border-radius:10px;padding:1.2rem;border:1px solid var(--border)}
.tipo-mini-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.5rem}
.tipo-mini-val{font-family:'Roboto',sans-serif;font-size:1.5rem;font-weight:800}
.tipo-mini-sub{font-size:11px;color:var(--muted);margin-top:3px}

/* COMPANY DETAIL */
.det-header{display:flex;align-items:center;gap:12px;margin-bottom:1.5rem}
.det-badge{width:14px;height:14px;border-radius:50%}
.det-title{font-family:'Roboto',sans-serif;font-size:1.8rem;font-weight:800}
.det-sub{color:var(--muted);font-size:13px;margin-top:3px}

.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem}
.stat{background:var(--card);border-radius:10px;padding:1.1rem 1.2rem;border:1px solid var(--border)}
.stat-l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.stat-v{font-family:'Roboto',sans-serif;font-size:1.8rem;font-weight:800;line-height:1}
.stat-sub{font-size:11px;color:var(--muted);margin-top:4px}

.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:1.5rem}
.charts-row.full{grid-template-columns:1fr}
.c-card{background:var(--card);border-radius:12px;padding:1.5rem;border:1px solid var(--border)}
.c-card-title{font-family:'Roboto',sans-serif;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:1rem}
.leg{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:12px;font-size:11px;color:var(--muted)}
.leg span{display:flex;align-items:center;gap:5px}
.leg i{width:9px;height:9px;border-radius:2px;flex-shrink:0}

/* PROJ TABLE */
.proj-wrap{background:var(--card);border-radius:12px;padding:1.5rem;border:1px solid var(--border);margin-bottom:1.5rem}
.proj-wrap h3{font-family:'Roboto',sans-serif;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:1rem}
.proj-tbl{width:100%;border-collapse:collapse;font-size:13px}
.proj-tbl th{color:var(--muted);font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;padding:0 10px 8px;text-align:right}
.proj-tbl th:first-child{text-align:left}
.proj-tbl td{padding:9px 10px;border-top:1px solid var(--border);text-align:right}
.proj-tbl td:first-child{text-align:left;font-weight:500}
.proj-tbl tr:hover td{background:#f9f7f3}
.proj-tbl .tr-total td{font-family:'Roboto',sans-serif;font-weight:700;background:#f4f1eb}
.proj-tbl .tr-inst td{font-style:italic;color:var(--muted)}
.proj-tbl .zero{color:#ccc}
.tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:500}
.tag-c{background:#e8eef9;color:#185FA5}
.tag-e{background:#f1f0ef;color:#555}
.tag-r{background:#fceae4;color:#993C1D}

/* INSTIT SECTION */
.instit-box{background:var(--bg);border-radius:10px;padding:1rem 1.2rem;border:1px solid var(--border);margin-top:12px}
.instit-box h4{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.5rem;font-weight:500}
.instit-pills{display:flex;gap:8px;flex-wrap:wrap;font-size:12px}
.inst-pill{background:#fff;border:1px solid var(--border);border-radius:8px;padding:6px 12px}
.inst-pill strong{font-family:'Roboto',sans-serif;font-size:1rem;font-weight:700;display:block;line-height:1}
.inst-pill span{color:var(--muted);font-size:10px}

/* TOTAL GERAL FOOTER */
.totals-footer{display:flex;gap:16px;flex-wrap:wrap;margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid var(--border)}
.tf-item{font-size:13px;color:var(--muted)}
.tf-item strong{font-family:'Roboto',sans-serif;font-size:1.1rem;font-weight:800;color:var(--text);margin-left:6px}

@media(max-width:900px){
  .ov-grid{grid-template-columns:repeat(3,1fr)}
  .charts-row{grid-template-columns:1fr}
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .tipos-grid{grid-template-columns:1fr}
}
@media(max-width:600px){
  .top-bar,.co-nav,.ov-grid,.content{padding-left:1rem;padding-right:1rem}
  .ov-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<div class="top-bar">
  <div>
    <h1>Relatório de Posts</h1>
    <p>01 de abril — 25 de maio de 2026</p>
  </div>
  <div class="m-btns">
    <button class="m-btn active" data-m="ambos">Ambos os meses</button>
    <button class="m-btn" data-m="abril">Abril</button>
    <button class="m-btn" data-m="maio">Maio</button>
  </div>
</div>

<nav class="co-nav">
  <button class="co-tab active" data-co="geral" style="--ac:#fff">Visão Geral</button>
  <button class="co-tab" data-co="FAZ" style="--ac:#1db3e8">FAZ</button>
  <button class="co-tab" data-co="PLANNETA" style="--ac:#f29106">PLANNETA</button>
  <button class="co-tab" data-co="VITAE" style="--ac:#005caa">VITAE</button>
  <button class="co-tab" data-co="SOLUM" style="--ac:#008237">SOLUM</button>
  <button class="co-tab" data-co="EDUCA MUNDI" style="--ac:#8035b2">EDUCA MUNDI</button>
</nav>

<div class="ov-grid" id="ovGrid"></div>
<div class="content" id="mainContent"></div>

<script>
Chart.register(ChartDataLabels);
const datalabelsConfig = {

const datalabelsConfigWhite = {

  font:{family:'Roboto',size:11,weight:'700'},
  color:'#fff',
  formatter: v => v === 0 ? '' : v
};
const datalabelsHBar = {
  anchor:'end', align:'end', offset:4,
  font:{family:'Roboto',size:11,weight:'700'},
  color:'#444',
  formatter: v => v === 0 ? '' : v
};
const D = {
  FAZ:{
    color:'#1db3e8',colorL:'#e6f7fd',
    abril:{
      total:26,totalProjeto:14,totalInstitucional:12,
      tipos:{Carrossel:12,Estático:1,Reels:13},
      projetos:[
        {nome:'Caçapava',Carrossel:0,Estático:0,Reels:3,total:3},
        {nome:'Cafelândia',Carrossel:2,Estático:0,Reels:0,total:2},
        {nome:'Cerquilho',Carrossel:0,Estático:0,Reels:0,total:0},
        {nome:'Fernandópolis',Carrossel:0,Estático:0,Reels:0,total:0},
        {nome:'Juquitiba',Carrossel:0,Estático:0,Reels:0,total:0},
        {nome:'Osasco',Carrossel:0,Estático:0,Reels:0,total:0},
        {nome:'Paraty',Carrossel:5,Estático:0,Reels:1,total:6},
        {nome:'Porto Feliz',Carrossel:0,Estático:0,Reels:0,total:0},
        {nome:'Rio Claro',Carrossel:0,Estático:0,Reels:0,total:0},
        {nome:'Serra Negra',Carrossel:1,Estático:0,Reels:0,total:1},
        {nome:'Ubatuba',Carrossel:2,Estático:0,Reels:0,total:2},
      ],
      institucional:{Carrossel:2,Estático:1,Reels:9,total:12}
    },
    maio:{
      total:27,totalProjeto:23,totalInstitucional:4,
      tipos:{Carrossel:19,Estático:1,Reels:7},
      projetos:[
        {nome:'Caçapava',Carrossel:3,Estático:0,Reels:1,total:4},
        {nome:'Cafelândia',Carrossel:1,Estático:0,Reels:0,total:1},
        {nome:'Cerquilho',Carrossel:0,Estático:0,Reels:0,total:0},
        {nome:'Fernandópolis',Carrossel:0,Estático:0,Reels:0,total:0},
        {nome:'Juquitiba',Carrossel:0,Estático:0,Reels:0,total:0},
        {nome:'Osasco',Carrossel:2,Estático:0,Reels:0,total:2},
        {nome:'Paraty',Carrossel:6,Estático:1,Reels:2,total:9},
        {nome:'Porto Feliz',Carrossel:0,Estático:0,Reels:1,total:1},
        {nome:'Rio Claro',Carrossel:0,Estático:0,Reels:0,total:0},
        {nome:'Serra Negra',Carrossel:2,Estático:0,Reels:0,total:2},
        {nome:'Ubatuba',Carrossel:4,Estático:0,Reels:0,total:4},
      ],
      institucional:{Carrossel:1,Estático:0,Reels:3,total:4}
    }
  },
  PLANNETA:{
    color:'#f29106',colorL:'#fef3e2',
    abril:{
      total:15,totalProjeto:15,totalInstitucional:0,
      tipos:{Carrossel:3,Estático:1,Reels:11},
      projetos:[
        {nome:'Osasco',Carrossel:3,Estático:1,Reels:6,total:10},
        {nome:'Marília',Carrossel:0,Estático:0,Reels:4,total:4},
        {nome:'Taboão da Serra',Carrossel:0,Estático:0,Reels:1,total:1},
      ],
      institucional:{Carrossel:0,Estático:0,Reels:0,total:0}
    },
    maio:{
      total:20,totalProjeto:18,totalInstitucional:2,
      tipos:{Carrossel:14,Estático:1,Reels:5},
      projetos:[
        {nome:'Osasco',Carrossel:9,Estático:0,Reels:3,total:12},
        {nome:'Marília',Carrossel:2,Estático:0,Reels:2,total:4},
        {nome:'Taboão da Serra',Carrossel:2,Estático:0,Reels:0,total:2},
      ],
      institucional:{Carrossel:1,Estático:1,Reels:0,total:2}
    }
  },
  VITAE:{
    color:'#005caa',colorL:'#e0ecf7',
    abril:{total:3,tipos:{Carrossel:2,Estático:0,Reels:1},projetos:null,institucional:null},
    maio:{total:2,tipos:{Carrossel:1,Estático:0,Reels:1},projetos:null,institucional:null}
  },
  SOLUM:{
    color:'#008237',colorL:'#e0f2e9',
    abril:{total:3,tipos:{Carrossel:2,Estático:0,Reels:1},projetos:null,institucional:null},
    maio:{total:0,tipos:{Carrossel:0,Estático:0,Reels:0},projetos:null,institucional:null}
  },
  'EDUCA MUNDI':{
    color:'#8035b2',colorL:'#f2e8f9',
    abril:{total:2,tipos:{Carrossel:2,Estático:0,Reels:0},projetos:null,institucional:null},
    maio:{total:2,tipos:{Carrossel:1,Estático:1,Reels:0},projetos:null,institucional:null}
  }
};
const COS = Object.keys(D);
let curMonth = 'ambos';
let curCo = 'geral';
let chartInstances = {};

function hexAlpha(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
function getMonthData(co){
  if(curMonth==='ambos') return null;
  return D[co][curMonth];
}

// Overview cards
function renderOv(){
  const el=document.getElementById('ovGrid');
  el.innerHTML=COS.map(co=>{
    const d=D[co];
    const ab=d.abril.total, ma=d.maio.total;
    const active=curCo===co?'active':'';
    const ac=d.color;
    const abW=ab/(Math.max(ab,ma)||1)*100;
    const maW=ma/(Math.max(ab,ma)||1)*100;
    const abAct=curMonth==='ambos'||curMonth==='abril'?'active-m':'';
    const maAct=curMonth==='ambos'||curMonth==='maio'?'active-m':'';
    return `<div class="ov-card ${active}" style="--ac:${ac}" onclick="setCo('${co}')">
      <div class="ov-name">${co}</div>
      <div class="ov-row">
        <div class="ov-m">
          <div class="ov-ml">Abr</div>
          <div class="ov-v" style="color:${curMonth==='ambos'||curMonth==='abril'?ac:'#555'}">${ab}</div>
          <div class="ov-bar ${abAct}" style="width:${abW}%;background:${ac}"></div>
        </div>
        <div class="ov-m">
          <div class="ov-ml">Mai</div>
          <div class="ov-v" style="color:${curMonth==='ambos'||curMonth==='maio'?ac:'#555'}">${ma}</div>
          <div class="ov-bar ${maAct}" style="width:${maW}%;background:${ac}"></div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function destroyCharts(){
  Object.values(chartInstances).forEach(c=>c.destroy());
  chartInstances={};
}

// GERAL VIEW
function renderGeral(){
  destroyCharts();
  const el=document.getElementById('mainContent');

  // Totals per tipo, all companies
  const abTipos={Carrossel:0,Estático:0,Reels:0};
  const maTipos={Carrossel:0,Estático:0,Reels:0};
  COS.forEach(co=>{
    ['Carrossel','Estático','Reels'].forEach(t=>{
      abTipos[t]+=D[co].abril.tipos[t];
      maTipos[t]+=D[co].maio.tipos[t];
    });
  });
  const abTotal=COS.reduce((s,co)=>s+D[co].abril.total,0);
  const maTotal=COS.reduce((s,co)=>s+D[co].maio.total,0);

  el.innerHTML=`
    <div style="margin-bottom:1.5rem;display:flex;gap:10px;flex-wrap:wrap">
      <div class="stat" style="flex:1;min-width:140px">
        <div class="stat-l">Total Abril</div>
        <div class="stat-v">${abTotal}</div>
        <div class="stat-sub">posts publicados</div>
      </div>
      <div class="stat" style="flex:1;min-width:140px">
        <div class="stat-l">Total Maio</div>
        <div class="stat-v">${maTotal}</div>
        <div class="stat-sub">posts publicados</div>
      </div>
      <div class="stat" style="flex:1;min-width:140px">
        <div class="stat-l">Total Geral</div>
        <div class="stat-v">${abTotal+maTotal}</div>
        <div class="stat-sub">em 5 empresas</div>
      </div>
    </div>

    <div class="geral-chart-card">
      <h2>Posts por empresa — Abril vs. Maio</h2>
      <div style="position:relative;height:260px">
        <canvas id="geralChart" role="img" aria-label="Gráfico de posts por empresa comparando abril e maio">Posts por empresa: FAZ abr 26 mai 27, PLANNETA abr 15 mai 20, VITAE abr 3 mai 2, SOLUM abr 3 mai 0, EDUCA MUNDI abr 2 mai 2.</canvas>
      </div>
    </div>

    <div class="geral-chart-card">
      <h2>Tipos de publicação — totais combinados (todas as empresas)</h2>
      <div style="position:relative;height:240px">
        <canvas id="tiposGeralChart" role="img" aria-label="Gráfico de tipos de publicação por mês">Tipos totais: Carrossel abril ${abTipos.Carrossel} maio ${maTipos.Carrossel}, Estático abril ${abTipos.Estático} maio ${maTipos.Estático}, Reels abril ${abTipos.Reels} maio ${maTipos.Reels}.</canvas>
      </div>
    </div>
  `;

  // Geral chart
  const gc=new Chart(document.getElementById('geralChart'),{
    type:'bar',
    data:{
      labels:COS,
      datasets:[
        {label:'Abril',data:COS.map(co=>D[co].abril.total),backgroundColor:COS.map(co=>D[co].color),borderRadius:4,datalabels:{labels:{
          value:{anchor:'end',align:'end',offset:2,font:{family:'Roboto',size:11,weight:'700'},color:'#444',formatter:v=>v===0?'':v},
          month:{anchor:'start',align:'bottom',offset:2,font:{family:'Roboto',size:9,weight:'400'},color:'#888',formatter:v=>v===0?'':'Abril'}
        }}},
        {label:'Maio',data:COS.map(co=>D[co].maio.total),backgroundColor:COS.map(co=>hexAlpha(D[co].color,.4)),borderRadius:4,borderWidth:1.5,borderColor:COS.map(co=>D[co].color),datalabels:{labels:{
          value:{anchor:'end',align:'end',offset:2,font:{family:'Roboto',size:11,weight:'700'},color:'#444',formatter:v=>v===0?'':v},
          month:{anchor:'start',align:'bottom',offset:2,font:{family:'Roboto',size:9,weight:'400'},color:'#888',formatter:v=>v===0?'':'Maio'}
        }}}
      ]
    },
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},datalabels:datalabelsConfig},layout:{padding:{top:16,bottom:10}},
      scales:{x:{grid:{display:false},ticks:{font:{family:'Roboto',size:12},padding:14}},y:{display:false}}}
  });
  chartInstances.gc=gc;

  const tgc=new Chart(document.getElementById('tiposGeralChart'),{
    type:'bar',
    data:{
      labels:['Carrossel','Estático','Reels'],
      datasets:[
        {label:'Abril',data:[abTipos.Carrossel,abTipos.Estático,abTipos.Reels],backgroundColor:['#4a7cc7','#888','#c85522'],borderRadius:4,datalabels:{labels:{
          value:{anchor:'end',align:'end',offset:2,font:{family:'Roboto',size:11,weight:'700'},color:'#444',formatter:v=>v===0?'':v},
          month:{anchor:'start',align:'bottom',offset:2,font:{family:'Roboto',size:9,weight:'400'},color:'#888',formatter:v=>v===0?'':'Abril'}
        }}},
        {label:'Maio',data:[maTipos.Carrossel,maTipos.Estático,maTipos.Reels],backgroundColor:['#a3c4ed','#bbb','#e8a07a'],borderRadius:4,borderWidth:1,borderColor:['#4a7cc7','#888','#c85522'],datalabels:{labels:{
          value:{anchor:'end',align:'end',offset:2,font:{family:'Roboto',size:11,weight:'700'},color:'#444',formatter:v=>v===0?'':v},
          month:{anchor:'start',align:'bottom',offset:2,font:{family:'Roboto',size:9,weight:'400'},color:'#888',formatter:v=>v===0?'':'Maio'}
        }}}
      ]
    },
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},datalabels:datalabelsConfig},layout:{padding:{top:16,bottom:10}},
      scales:{x:{grid:{display:false},ticks:{font:{family:'Roboto',size:13},padding:14}},y:{display:false}}}
  });
  chartInstances.tgc=tgc;
}

// COMPANY DETAIL VIEW
function renderCompany(co){
  destroyCharts();
  const d=D[co];
  const el=document.getElementById('mainContent');
  const hasProjetos=!!d.abril.projetos;

  const ab=d.abril, ma=d.maio;

  // Stats
  function statsForMonth(m){
    if(m==='ambos') return {total:ab.total+ma.total,C:ab.tipos.Carrossel+ma.tipos.Carrossel,E:ab.tipos.Estático+ma.tipos.Estático,R:ab.tipos.Reels+ma.tipos.Reels};
    const md=d[m];
    return {total:md.total,C:md.tipos.Carrossel,E:md.tipos.Estático,R:md.tipos.Reels};
  }
  const st=statsForMonth(curMonth);
  const monthLabel=curMonth==='ambos'?'Abr + Mai':curMonth==='abril'?'Abril':'Maio';

  // Projects table rows (all cities if FAZ/PLANNETA)
  function projRow(p,ab_p,ma_p){
    const show = curMonth==='ambos'?true:true;
    const abv=ab_p?ab_p.total:0, mav=ma_p?ma_p.total:0;
    const bothZero=abv===0&&mav===0;
    const zc=bothZero?'zero':'';
    function cell(v){return `<td class="${v===0?'zero':''}">${v===0?'—':v}</td>`;}
    function cellC(p_,t){return `<td class="${p_&&p_[t]>0?'':''}">${p_&&p_[t]>0?`<span class="tag tag-${t[0].toLowerCase()}">${p_[t]}</span>`:'—'}</td>`;}

    if(curMonth==='ambos'){
      return `<tr>
        <td class="${bothZero?'zero':''}">${p}</td>
        ${cell(abv)}
        ${cell(mav)}
        <td><strong class="${bothZero?'zero':''}">${abv+mav}</strong></td>
      </tr>`;
    } else {
      const pd=curMonth==='abril'?ab_p:ma_p;
      const v=pd?pd.total:0;
      const C=pd?pd.Carrossel:0,E=pd?pd.Estático:0,R=pd?pd.Reels:0;
      return `<tr>
        <td class="${v===0?'zero':''}">${p}</td>
        <td>${C>0?`<span class="tag tag-c">${C}</span>`:'—'}</td>
        <td>${E>0?`<span class="tag tag-e">${E}</span>`:'—'}</td>
        <td>${R>0?`<span class="tag tag-r">${R}</span>`:'—'}</td>
        <td><strong class="${v===0?'zero':''}">${v===0?'—':v}</strong></td>
      </tr>`;
    }
  }

  let projHTML='';
  if(hasProjetos){
    const allCities=[...new Set([...ab.projetos.map(p=>p.nome)])];
    const abMap={},maMap={};
    ab.projetos.forEach(p=>abMap[p.nome]=p);
    ma.projetos.forEach(p=>maMap[p.nome]=p);

    function buildTable(mes, dataMap, projTotal){
      const rows=allCities.map(city=>{
        const p=dataMap[city];
        const C=p?p.Carrossel:0,E=p?p.Estático:0,R=p?p.Reels:0,T=p?p.total:0;
        const zero=T===0;
        return `<tr>
          <td style="text-align:left;padding:7px 10px;border-top:1px solid var(--border);${zero?'color:#bbb':''}">${city}</td>
          <td style="text-align:center;padding:7px 10px;border-top:1px solid var(--border);${zero?'color:#bbb':''}">${C||'—'}</td>
          <td style="text-align:center;padding:7px 10px;border-top:1px solid var(--border);${zero?'color:#bbb':''}">${E||'—'}</td>
          <td style="text-align:center;padding:7px 10px;border-top:1px solid var(--border);${zero?'color:#bbb':''}">${R||'—'}</td>
          <td style="text-align:center;padding:7px 10px;border-top:1px solid var(--border);font-weight:700;${zero?'color:#bbb':''}">${T||'0'}</td>
        </tr>`;
      }).join('');
      return `<table style="width:100%;border-collapse:collapse;font-size:13px">
        <thead>
          <tr><th colspan="5" style="background:${d.color};color:#fff;text-align:center;padding:9px 10px;font-size:12px;font-weight:700;letter-spacing:.08em;border-radius:8px 8px 0 0">${mes.toUpperCase()}</th></tr>
          <tr style="background:#f4f1eb">
            <th style="text-align:left;padding:7px 10px;font-size:11px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.05em"></th>
            <th style="text-align:center;padding:7px 10px;font-size:11px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.05em">Carrossel</th>
            <th style="text-align:center;padding:7px 10px;font-size:11px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.05em">Estático</th>
            <th style="text-align:center;padding:7px 10px;font-size:11px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.05em">Reels</th>
            <th style="text-align:center;padding:7px 10px;font-size:11px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.05em">Total</th>
          </tr>
        </thead>
        <tbody>
          ${rows}
          <tr style="background:${d.color}1a">
            <td style="text-align:left;padding:8px 10px;border-top:2px solid ${d.color};font-weight:700;font-size:12px;letter-spacing:.04em;text-transform:uppercase">TOTAL PROJETO</td>
            <td style="text-align:center;padding:8px 10px;border-top:2px solid ${d.color}"></td>
            <td style="text-align:center;padding:8px 10px;border-top:2px solid ${d.color}"></td>
            <td style="text-align:center;padding:8px 10px;border-top:2px solid ${d.color}"></td>
            <td style="text-align:center;padding:8px 10px;border-top:2px solid ${d.color};font-weight:700;font-size:14px">${projTotal}</td>
          </tr>
        </tbody>
      </table>`;
    }

    projHTML=`
    <div class="proj-wrap">
      <h3>Publicações por projeto (cidade)</h3>
      <div style="display:grid;grid-template-columns:1fr;gap:16px">
        ${buildTable('Abril', abMap, ab.totalProjeto||0)}
        ${buildTable('Maio', maMap, ma.totalProjeto||0)}
      </div>
    </div>`;
  }

  const changeNote = ab.total>0&&ma.total>0 ? (
    ma.total>ab.total
      ? `<span style="color:#1D9E75">▲ +${ma.total-ab.total} vs Abril</span>`
      : ma.total<ab.total
      ? `<span style="color:#D85A30">▼ ${ma.total-ab.total} vs Abril</span>`
      : `<span style="color:#888">= igual a Abril</span>`
  ):'';

  el.innerHTML=`
    <div class="det-header">
      <div class="det-badge" style="background:${d.color};width:18px;height:18px;border-radius:50%;flex-shrink:0"></div>
      <div>
        <div class="det-title">${co}</div>
        <div class="det-sub">${hasProjetos?'Com projetos por cidade':'Sem projetos específicos'} · ${monthLabel}</div>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat">
        <div class="stat-l">Total de posts</div>
        <div class="stat-v" style="color:${d.color}">${st.total}</div>
        <div class="stat-sub">${monthLabel}</div>
      </div>
      <div class="stat">
        <div class="stat-l">Carrossel</div>
        <div class="stat-v">${st.C}</div>
        <div class="stat-sub">${st.total>0?Math.round(st.C/st.total*100):0}% do total</div>
      </div>
      <div class="stat">
        <div class="stat-l">Estático</div>
        <div class="stat-v">${st.E}</div>
        <div class="stat-sub">${st.total>0?Math.round(st.E/st.total*100):0}% do total</div>
      </div>
      <div class="stat">
        <div class="stat-l">Reels</div>
        <div class="stat-v">${st.R}</div>
        <div class="stat-sub">${st.total>0?Math.round(st.R/st.total*100):0}% do total</div>
      </div>
    </div>

    <div class="charts-row full">
      <div class="c-card">
        <div class="c-card-title">Tipos de publicação — Abril vs. Maio</div>
        <div class="leg">
          <span><i style="background:${d.color}"></i> Abril</span>
          <span><i style="background:${d.color};opacity:.4;border:1px dashed ${d.color}"></i> Maio</span>
        </div>
        <div style="position:relative;height:220px">
          <canvas id="tiposChart" role="img" aria-label="Gráfico de tipos de publicação abril vs maio para ${co}">Carrossel: Abr ${ab.tipos.Carrossel} Mai ${ma.tipos.Carrossel}. Estático: Abr ${ab.tipos.Estático} Mai ${ma.tipos.Estático}. Reels: Abr ${ab.tipos.Reels} Mai ${ma.tipos.Reels}.</canvas>
        </div>
      </div>
    </div>

    ${hasProjetos ? `
    <div class="c-card" style="margin-bottom:1.5rem">
      <div class="c-card-title">Projeto vs. Institucional — total do período</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;align-items:center;gap:1.5rem">
        <div style="position:relative;height:220px">
          <canvas id="pizzaChart" role="img" aria-label="Gráfico de pizza projeto vs institucional para ${co}">Projeto: ${ab.totalProjeto+ma.totalProjeto}. Institucional: ${(ab.totalInstitucional||0)+(ma.totalInstitucional||0)}.</canvas>
        </div>
        <div style="display:flex;flex-direction:column;gap:12px">
          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:14px;height:14px;border-radius:3px;background:${d.color};flex-shrink:0"></div>
            <div>
              <div style="font-size:12px;color:var(--muted)">Projeto</div>
              <div style="font-family:'Roboto',sans-serif;font-size:1.4rem;font-weight:700">${ab.totalProjeto+ma.totalProjeto} <span style="font-size:13px;font-weight:400;color:var(--muted)">posts</span></div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:14px;height:14px;border-radius:3px;background:${hexAlpha(d.color,.35)};border:1.5px solid ${d.color};flex-shrink:0"></div>
            <div>
              <div style="font-size:12px;color:var(--muted)">Institucional</div>
              <div style="font-family:'Roboto',sans-serif;font-size:1.4rem;font-weight:700">${(ab.totalInstitucional||0)+(ma.totalInstitucional||0)} <span style="font-size:13px;font-weight:400;color:var(--muted)">posts</span></div>
            </div>
          </div>
        </div>
      </div>
    </div>` : ''}

    ${projHTML}

    <div class="totals-footer">
      <div class="tf-item">Abril <strong>${ab.total}</strong></div>
      <div class="tf-item" style="color:var(--border)">|</div>
      <div class="tf-item">Maio <strong>${ma.total}</strong> ${changeNote}</div>
      <div class="tf-item" style="color:var(--border)">|</div>
      <div class="tf-item">Total período <strong>${ab.total+ma.total}</strong></div>
    </div>
  `;

  // tipos chart
  const tc=new Chart(document.getElementById('tiposChart'),{
    type:'bar',
    data:{
      labels:['Carrossel','Estático','Reels'],
      datasets:[
        {label:'Abril',data:[ab.tipos.Carrossel,ab.tipos.Estático,ab.tipos.Reels],backgroundColor:d.color,borderRadius:4,datalabels:datalabelsConfig},
        {label:'Maio',data:[ma.tipos.Carrossel,ma.tipos.Estático,ma.tipos.Reels],backgroundColor:hexAlpha(d.color,.35),borderRadius:4,borderWidth:1.5,borderColor:d.color,datalabels:datalabelsConfig}
      ]
    },
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},datalabels:datalabelsConfig},layout:{padding:{top:16}},
      scales:{x:{grid:{display:false},ticks:{font:{family:'Roboto',size:12}}},y:{display:false}}}
  });
  chartInstances.tc=tc;

  if(hasProjetos){
    const projTotal=ab.totalProjeto+ma.totalProjeto;
    const instTotal=(ab.totalInstitucional||0)+(ma.totalInstitucional||0);
    const pc=new Chart(document.getElementById('pizzaChart'),{
      type:'doughnut',
      data:{
        labels:['Projeto','Institucional'],
        datasets:[{
          data:[projTotal,instTotal],
          backgroundColor:[d.color,hexAlpha(d.color,.3)],
          borderColor:[d.color,d.color],
          borderWidth:1.5,
          hoverOffset:6
        }]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        cutout:'60%',
        plugins:{
          legend:{display:false},
          datalabels:{
            color:'#fff',
            font:{family:'Roboto',size:12,weight:'700'},
            formatter:(v,ctx)=>{
              const total=ctx.dataset.data.reduce((a,b)=>a+b,0);
              return total>0?Math.round(v/total*100)+'%':'';
            }
          }
        }
      }
    });
    chartInstances.pc=pc;
  }
}

function render(){
  renderOv();
  if(curCo==='geral') renderGeral();
  else renderCompany(curCo);
}

function setCo(co){
  curCo=co;
  document.querySelectorAll('.co-tab').forEach(b=>b.classList.toggle('active',b.dataset.co===co));
  document.querySelectorAll('.ov-card').forEach((c,i)=>c.classList.toggle('active',COS[i]===co));
  render();
}

// Month buttons
document.querySelectorAll('.m-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    curMonth=b.dataset.m;
    document.querySelectorAll('.m-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    render();
  });
});

// Company tabs
document.querySelectorAll('.co-tab').forEach(b=>{
  b.addEventListener('click',()=>setCo(b.dataset.co));
});

// Company overview cards
document.addEventListener('click',e=>{
  const card=e.target.closest('.ov-card');
  if(card){
    const idx=[...document.querySelectorAll('.ov-card')].indexOf(card);
    if(idx>=0) setCo(COS[idx]);
  }
});

render();
</script>
</body>
</html>
